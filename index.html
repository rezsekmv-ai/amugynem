<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>amúgy nem</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --fg: #e8eaed;
      --muted: #8b919c;
      --accent: #5b8cff;
      --no: #ff5b6e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #1b2030, var(--bg));
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid #232733;
      border-radius: 18px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      text-align: center;
    }
    h1 { font-size: 15px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 22px; }
    .field { display: flex; flex-direction: column; gap: 12px; }
    .actions { display: flex; gap: 10px; }
    input {
      width: 100%;
      background: #0e1016;
      border: 1px solid #2a2f3c;
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--fg);
      font-size: 16px;
      outline: none;
      transition: border-color .15s ease;
      min-width: 0;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s ease, filter .15s ease, background .15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px) scale(.98); }
    .mic {
      background: #232733;
      color: var(--fg);
      width: 54px;
      height: 48px;
      flex: 0 0 auto;
      padding: 0;
    }
    .mic svg { width: 20px; height: 20px; }
    .mic.recording { background: var(--no); animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,91,110,.5); } 50% { box-shadow: 0 0 0 8px rgba(255,91,110,0); } }
    .ok { background: var(--accent); color: #fff; flex: 1; height: 48px; padding: 0 22px; }
    .answer {
      margin-top: 26px;
      min-height: 40px;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--no);
      opacity: 0;
      transform: translateY(8px) scale(.96);
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
    }
    .answer.show { opacity: 1; transform: translateY(0) scale(1); }
    .hint { margin-top: 14px; font-size: 12px; color: var(--muted); min-height: 16px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>írj be valamit (vagy mondd be)</h1>
    <form class="field" id="form">
      <input id="input" type="text" placeholder="bármit…" autocomplete="off" autofocus />
      <div class="actions">
        <button type="button" class="btn mic" id="mic" title="Beszéd hangból" aria-label="Mikrofon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button type="submit" class="btn ok">oké</button>
      </div>
    </form>
    <div class="answer" id="answer">amúgy nem</div>
    <div class="hint" id="hint"></div>
  </main>

  <script>
    const form = document.getElementById('form');
    const answer = document.getElementById('answer');
    const input = document.getElementById('input');
    const mic = document.getElementById('mic');
    const hint = document.getElementById('hint');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      // 15% "Haveeer", 15% "Tesooo", otherwise "amúgy nem"
      const r = Math.random();
      answer.textContent = r < 0.15 ? 'Haveeer' : r < 0.30 ? 'Tesooo' : 'amúgy nem';
      answer.classList.remove('show');
      void answer.offsetWidth; // restart animation on repeated clicks
      answer.classList.add('show');
    });

    // Voice input via the browser's built-in speech recognition (Hungarian).
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      mic.disabled = true;
      mic.style.opacity = .4;
      mic.title = 'A böngésződ nem támogatja a beszédfelismerést';
      hint.textContent = 'Hang: a böngésződ nem támogatja (próbáld Chrome-ban).';
    } else {
      const rec = new SR();
      rec.lang = 'hu-HU';
      rec.interimResults = true;
      rec.continuous = false;
      let listening = false;

      mic.addEventListener('click', () => {
        if (listening) { rec.stop(); return; }
        try { rec.start(); } catch (_) {}
      });

      rec.onstart = () => { listening = true; mic.classList.add('recording'); hint.textContent = 'Hallgatlak…'; };
      rec.onend = () => { listening = false; mic.classList.remove('recording'); if (hint.textContent === 'Hallgatlak…') hint.textContent = ''; };
      rec.onerror = (e) => {
        listening = false; mic.classList.remove('recording');
        hint.textContent = e.error === 'not-allowed'
          ? 'Mikrofon-engedély kell.'
          : 'Hang hiba: ' + e.error;
      };
      rec.onresult = (e) => {
        let text = '';
        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
        input.value = text.trim();
        if (e.results[e.results.length - 1].isFinal) hint.textContent = '';
      };
    }
  </script>
</body>
</html>
